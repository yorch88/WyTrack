version: "3.9"

services:

  # =========================
  # FRONTEND (React + Vite)
  # =========================
  frontend:
    build: ./frontend
    container_name: wytrack-frontend

    ports:
      - "5173:5173"

    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

    volumes:
      - ./frontend:/app
      - /app/node_modules

    command: sh -c "npm install && npm run dev"

    depends_on:
      - backend

  # =========================
  # BACKEND (FastAPI)
  # =========================
  backend:
    build: ./backend
    container_name: wytrack-backend

    env_file:
      - ./backend/.env

    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started

    command: >
      sh -c "uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload"

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

  # =========================
  # MONGO
  # =========================
  mongo:
    image: mongo:7
    container_name: wytrack-mongo
    restart: always

    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword

    ports:
      - "27018:27017"

    volumes:
      - mongo_data:/data/db

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =========================
  # REDIS
  # =========================
  redis:
    image: redis:7
    container_name: wytrack-redis

    ports:
      - "6379:6379"

volumes:
  mongo_data: